services:
  # ─── Telegram Local Bot API Server ──────────────────────────────────
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "1"
    volumes:
      - telegram-data:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8081"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── Nginx (reverse proxy + Telegram file server) ──────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"    # Comment out if using Cloudflare Tunnel
    volumes:
      - telegram-data:/var/lib/telegram-bot-api-data:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      telegram-bot-api:
        condition: service_healthy
    restart: unless-stopped

  # ─── Backend (NestJS) ──────────────────────────────────────────────
  backend:
    build: ./backend
    volumes:
      - tele-drive-db:/data
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/tele-drive.db
      TELEGRAM_API_ROOT: http://nginx:8088
    depends_on:
      telegram-bot-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/settings || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Frontend (Next.js) ────────────────────────────────────────────
  # NEXT_PUBLIC_* vars are baked at build time, not runtime
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    restart: unless-stopped

  # ─── Optional: Cloudflare Tunnel ───────────────────────────────────
  # Usage: docker compose --profile tunnel up -d
  # Configure tunnel in Cloudflare Zero Trust dashboard to route to http://nginx:80
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  telegram-data:
  tele-drive-db:
