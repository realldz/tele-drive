services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tele_drive
      POSTGRES_USER: tele_drive
      POSTGRES_PASSWORD: tele_drive
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tele_drive -d tele_drive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Telegram Local Bot API Server ──────────────────────────────────
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "1"
    volumes:
      - telegram-data:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8081"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── Nginx (reverse proxy + Telegram file server) ──────────────────
  nginx:
    build: ./nginx
    ports:
      - "${NGINX_PORT:-80}:80"    # Comment out if using Cloudflare Tunnel
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - telegram-data:/var/lib/telegram-bot-api-data:ro
      - ./nginx/ssl:/etc/nginx/ssl:rw
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-}
      - S3_DOMAIN=${S3_DOMAIN:-s3.example.com}
      - SSL_CERT_FILE=${SSL_CERT_FILE:-cert.pem}
      - SSL_KEY_FILE=${SSL_KEY_FILE:-key.pem}
    depends_on:
      telegram-bot-api:
        condition: service_healthy
      backend-core:
        condition: service_started
      backend-transfer:
        condition: service_started
      frontend:
        condition: service_started
    restart: unless-stopped

  # ─── Backend Core API (NestJS) ─────────────────────────────────────
  backend-core:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://tele_drive:tele_drive@postgres:5432/tele_drive
      TELEGRAM_API_ROOT: http://nginx:8088
      REDIS_URL: redis://redis:6379
      UPLOAD_BUFFER_DIR: /data/upload-buffer
      IS_TRANSFER_SERVICE: "false"
      # Data-plane ownership: Go transfer service owns heavy I/O (upload dispatch + ZIP assembly).
      # NestJS disables its BullMQ workers and hands off via gRPC / Redis events.
      UPLOAD_DISPATCH_OWNER: "go"
      ZIP_OWNER: "go"
      # Go owns ALL binary ingestion (encrypt + Telegram upload). NestJS only does
      # metadata/quota and disables every in-process direct-upload path.
      UPLOAD_IO_OWNER: "go"
      # Go owns the S3 data plane (GetObject/PutObject/HeadObject). nginx routes
      # these ops straight to the Go transfer service (no 307 redirect). NestJS
      # keeps only the control plane (bucket ops, multipart orchestration, copy,
      # delete, ListParts). Set to "nest" to instantly roll back to the legacy
      # 307/direct path (also revert nginx routing).
      S3_DATA_PLANE_OWNER: "go"
      # Go owns bandwidth enforcement (user/guest daily + per-file quota) via its
      # QuotaResolver on the download/stream/S3 data plane. The NestJS
      # BandwidthInterceptor short-circuits to pass-through on every route it
      # decorates. Set to "nest" to restore in-process enforcement (legacy path).
      BANDWIDTH_OWNER: "go"
      GO_TRANSFER_GRPC_URL: backend-transfer:50051
      GRPC_PORT: "50051"
      S3_DOMAIN: ${S3_DOMAIN:-s3.example.com}
    volumes:
      - ./backend/.logs:/app/.logs
      - upload-buffer:/data/upload-buffer
    depends_on:
      postgres:
        condition: service_healthy
      telegram-bot-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/v1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: ["sh", "-c", "npx prisma db push --skip-generate && node dist/main-core.js"]

  # ─── Backend Transfer API (Go) ─────────────────────────────────
  backend-transfer:
    build: ./backend-transfer-go
    env_file:
      - ./backend/.env
    environment:
      PORT: 3001
      # This service is the data plane: it owns upload dispatch + ZIP assembly
      # (see UPLOAD_DISPATCH_OWNER / ZIP_OWNER on backend-core).
      TELEGRAM_API_ROOT: http://nginx:8088
      REDIS_URL: redis://redis:6379
      UPLOAD_BUFFER_DIR: /data/upload-buffer
      # Files at or below this size are buffered to disk (enables retry +
      # concurrency); larger files stream straight to Telegram (no RAM/disk).
      # Keep in sync with NestJS MAX_BUFFER_FILE_SIZE.
      MAX_BUFFER_FILE_SIZE: ${MAX_BUFFER_FILE_SIZE:-52428800}
      NESTJS_GRPC_URL: backend-core:50051
      GRPC_PORT: "50051"
      # Host filter for the S3 data-plane routes (GET/PUT/HEAD object). Requests
      # are only treated as S3 API calls when Host matches this domain.
      S3_DOMAIN: ${S3_DOMAIN:-s3.example.com}
    volumes:
      - ./backend/.logs:/app/.logs
      - upload-buffer:/data/upload-buffer
    depends_on:
      telegram-bot-api:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/files/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Frontend (Next.js) ────────────────────────────────────────────
  # NEXT_PUBLIC_* vars are baked at build time, not runtime
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    restart: unless-stopped

  # ─── Optional: Cloudflare Tunnel ───────────────────────────────────
  # Usage: docker compose --profile tunnel up -d
  # Configure tunnel in Cloudflare Zero Trust dashboard to route to http://nginx:80
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  telegram-data:
  postgres-data:
  redis-data:
  upload-buffer:
